name: Update git-kura Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "git-kura version to publish, e.g. 0.1.3 or v0.1.3"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v6

      - name: Normalize version
        id: version
        run: |
          set -eux
          raw="${{ inputs.version }}"
          version="${raw#v}"
          tag="v${version}"

          case "$version" in
            [0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "invalid version: $version" >&2
              exit 1
              ;;
          esac

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Fetch checksums.txt
        run: |
          set -eux
          version="${{ steps.version.outputs.version }}"
          tag="${{ steps.version.outputs.tag }}"

          curl -fsSL \
            "https://github.com/tooppoo/git-kura/releases/download/${tag}/checksums.txt" \
            -o checksums.txt

          grep "git-kura_v${version}_Darwin_arm64.tar.gz" checksums.txt
          grep "git-kura_v${version}_Darwin_x86_64.tar.gz" checksums.txt
          grep "git-kura_v${version}_Linux_arm64.tar.gz" checksums.txt
          grep "git-kura_v${version}_Linux_x86_64.tar.gz" checksums.txt

      - name: Update Formula
        run: |
          set -eux
          ruby scripts/update-git-kura-formula.rb \
            "${{ steps.version.outputs.version }}" \
            checksums.txt

      - name: Show diff
        run: |
          set -eux
          git diff -- Formula/git-kura.rb

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          version="${{ steps.version.outputs.version }}"

          if git diff --quiet -- Formula/git-kura.rb; then
            echo "Formula/git-kura.rb is already up to date for v${version}."
            exit 0
          fi

          branch="update/git-kura-v${version}-${GITHUB_RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${branch}"
          git add Formula/git-kura.rb
          git commit -m "Update git-kura formula to v${version}"
          git push origin "${branch}"

          gh pr create \
            --title "Update git-kura formula to v${version}" \
            --body "Update git-kura Homebrew formula to v${version} using checksums.txt from the git-kura release." \
            --base main \
            --head "${branch}"
